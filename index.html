
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>XC Chrono — Cross Country Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0c1424;          /* deep navy */
    --bg-2:     #131c30;          /* slightly lighter */
    --panel:    #1a2540;          /* card surface */
    --panel-2:  #243152;          /* hover/active */
    --ink:      #eef0f5;
    --ink-dim:  #8c97b3;
    --line:     #2c3a5c;
    --gold:     #d4a851;          /* primary accent */
    --gold-2:   #f0c878;          /* gold highlight */
    --gold-dark:#8a6a2e;
    --silver:   #c8cdd9;
    --red:      #e26b5b;
    --green:    #7fb88c;
    --blue:     #6f8fc4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { min-height: 100vh;
    background:
      radial-gradient(circle at 80% -10%, rgba(212,168,81,0.06) 0%, transparent 50%),
      radial-gradient(circle at 0% 80%, rgba(111,143,196,0.04) 0%, transparent 50%),
      var(--bg);
    color: var(--ink); font-family: 'JetBrains Mono', 'Courier New', monospace;
    -webkit-font-smoothing: antialiased; }
  .ui { font-family: 'Inter', sans-serif; }
  .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  input, select, button, textarea { font-family: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: not-allowed; opacity: 0.4; }
  input::placeholder { color: var(--ink-dim); opacity: 0.6; }
  a { color: var(--gold-2); text-decoration: none; }
  a:hover { color: var(--gold); }

  .hdr { border-bottom: 1px solid var(--line); padding: 0;
    background: linear-gradient(180deg, rgba(212,168,81,0.05) 0%, transparent 100%);
    backdrop-filter: blur(8px); }
  .hdr-inner { max-width: 1100px; margin: 0 auto; padding: 18px 24px;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; }
  .hdr .logo { font-family: 'Bebas Neue', sans-serif; font-size: 34px; line-height: 1;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-2) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
  .hdr .logo span { color: var(--ink); -webkit-text-fill-color: var(--ink); }
  .hdr .sub { font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.15em; }
  .hdr .left { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .hdr .right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

  .btn { padding: 12px 22px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; font-size: 12px; transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s, background 0.2s;
    background: var(--panel); color: var(--ink); border: 1px solid var(--line); border-radius: 10px; }
  .btn:hover { background: var(--panel-2); }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #1a1408;
    border-color: var(--gold); box-shadow: 0 4px 14px rgba(212,168,81,0.25); }
  .btn-primary:hover { background: linear-gradient(135deg, var(--gold-2) 0%, var(--gold) 100%); }
  .btn-ghost { background: transparent; color: var(--ink-dim); border-color: transparent; }
  .btn-ghost:hover { color: var(--ink); background: transparent; }
  .btn-danger { color: var(--red); border-color: var(--red); background: transparent; }
  .btn-danger:hover { background: rgba(226,107,91,0.1); }
  .btn-silver { background: linear-gradient(135deg, var(--silver) 0%, #9ba3b5 100%); color: #1a2540; border-color: var(--silver); }
  .btn-sm { padding: 8px 14px; font-size: 10px; border-radius: 8px; }

  .field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--ink-dim); margin-bottom: 6px; font-family: 'Inter', sans-serif; }
  .field-input { width: 100%; padding: 12px 14px; background: var(--bg-2);
    border: 1px solid var(--line); color: var(--ink); font-size: 16px; outline: none;
    border-radius: 10px; transition: border-color 0.15s, box-shadow 0.15s; }
  .field-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,168,81,0.15); }

  .panel { background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    border: 1px solid var(--line); border-radius: 14px; }
  .panel-gold { border-color: rgba(212,168,81,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,81,0.1); }
  .hairline { border-top: 1px solid var(--line); margin: 18px 0; }

  .conn { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-dim); }
  .conn.live .conn-dot { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .flash { animation: flash 0.4s ease-out; }
  @keyframes flash { 0% { background: #fff !important; } 100% {} }
  @keyframes countpop { 0% { transform: scale(1); } 30% { transform: scale(1.15); color: var(--gold-2); } 100% { transform: scale(1); } }
  .pop { animation: countpop 0.3s ease-out; }

  .lock-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; letter-spacing: 0.15em; padding: 5px 10px; border: 1px solid var(--line); border-radius: 6px; }
  .lock-badge.unlocked { color: var(--green); border-color: var(--green); background: rgba(127,184,140,0.08); }
  .lock-badge.locked { color: var(--ink-dim); }
  .status-badge { display:inline-block; font-size:10px; letter-spacing:0.15em; padding:3px 9px; border:1px solid var(--line); border-radius:6px; margin-left:8px; vertical-align:middle; }
  .status-badge.completed { color: var(--green); border-color: var(--green); background: rgba(127,184,140,0.08); }
  .status-badge.active { color: var(--gold); border-color: var(--gold); background: rgba(212,168,81,0.08); }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 12px 16px; font-size: 10px; color: var(--ink-dim);
       letter-spacing: 0.2em; border-bottom: 1px solid var(--line); background: var(--bg-2);
       font-family: 'JetBrains Mono', monospace; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--line); font-size: 13px; }
  tr:last-child td { border-bottom: 0; }

  .land-hero { font-size: 96px; line-height: 0.92; margin-bottom: 12px; letter-spacing: -0.01em; }
  .land-hero .gold { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-2) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 760px) { .grid-2 { grid-template-columns: 1fr; } .land-hero { font-size: 60px; } }

  .timer-grid { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 73px); }
  @media (max-width: 900px) { .timer-grid { grid-template-columns: 1fr; } }
  .clock { font-size: min(220px, 22vw); line-height: 0.85;
    background: linear-gradient(180deg, var(--gold-2) 0%, var(--gold) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
    font-family: 'Bebas Neue', sans-serif; }
  .clock.idle { background: none; -webkit-text-fill-color: var(--ink-dim); color: var(--ink-dim); }

  .tap-counter { font-family: 'Bebas Neue', sans-serif; font-size: 160px;
    line-height: 0.9; color: var(--gold-2); font-variant-numeric: tabular-nums;
    text-align: center; padding: 24px 0; border: 1px solid var(--line); border-radius: 14px;
    margin: 18px 0; background: linear-gradient(180deg, rgba(212,168,81,0.08) 0%, rgba(212,168,81,0.02) 100%);
    box-shadow: inset 0 1px 0 rgba(212,168,81,0.15); display: block; }
  .tap-counter .lbl { font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-dim); letter-spacing: 0.3em; display:block; margin-bottom: 4px; }

  .tap-btn { width: 100%; padding: 88px 0; font-size: 96px;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.12em;
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: #1a1408; border: none; cursor: pointer; border-radius: 16px;
    box-shadow: 0 12px 32px rgba(212,168,81,0.35), inset 0 2px 0 rgba(255,255,255,0.2);
    transition: transform 0.1s, box-shadow 0.1s; }
  .tap-btn:active { transform: translateY(2px); box-shadow: 0 4px 16px rgba(212,168,81,0.2), inset 0 2px 0 rgba(255,255,255,0.2); background: linear-gradient(180deg, var(--gold-2) 0%, var(--gold) 100%); }
  .start-btn { width: 100%; padding: 60px 0; font-size: 56px;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.12em;
    background: linear-gradient(180deg, var(--gold-2) 0%, var(--gold) 100%);
    color: #1a1408; border: none; cursor: pointer; border-radius: 16px;
    box-shadow: 0 8px 24px rgba(212,168,81,0.25); }

  .bib-input { width: 100%; padding: 24px 28px; font-size: 72px;
    letter-spacing: 0.2em; text-align: center;
    background: var(--bg-2); border: 2px solid var(--gold);
    color: var(--ink); outline: none; font-variant-numeric: tabular-nums;
    font-family: 'JetBrains Mono', monospace; border-radius: 12px;
    box-shadow: 0 0 0 4px rgba(212,168,81,0.1); }
  .bib-input:disabled { opacity: 0.5; border-color: var(--line); box-shadow: none; }

  .role-card { background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%);
    border: 1px solid var(--line); padding: 28px; border-radius: 14px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .role-card.disabled { opacity: 0.5; cursor: not-allowed; }
  .role-card:not(.disabled):hover { border-color: var(--gold); transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,168,81,0.2); }
  .role-card .num { font-size: 10px; letter-spacing: 0.25em; margin-bottom: 12px;
                    color: var(--gold); font-family: 'JetBrains Mono', monospace; }
  .role-card .title { font-size: 42px; line-height: 1; margin-bottom: 10px;
                      font-family: 'Bebas Neue', sans-serif; }
  .role-card .desc { font-size: 13px; color: var(--ink-dim); line-height: 1.5;
                     font-family: 'Inter', sans-serif; }
  .role-card .note { font-size: 11px; color: var(--gold-2); margin-top: 14px;
                     letter-spacing: 0.1em; font-family: 'JetBrains Mono', monospace; }

  .stat { display: inline-block; margin-left: 28px; text-align: right; }
  .stat .v { font-size: 36px; line-height: 1; font-family: 'Bebas Neue', sans-serif; }
  .stat .v.alert { color: var(--gold); }
  .stat .l { font-size: 9px; color: var(--ink-dim); letter-spacing: 0.2em;
             text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }

  .err { color: var(--red); font-size: 12px; margin-top: 12px; font-family: 'JetBrains Mono', monospace; }
  .ok  { color: var(--green); font-size: 12px; margin-top: 12px; font-family: 'JetBrains Mono', monospace; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .wrap-narrow { max-width: 640px; margin: 60px auto; padding: 0 24px; }
  .wrap-wide { max-width: 900px; margin: 0 auto; padding: 60px 24px; }

  .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: linear-gradient(180deg, var(--panel) 0%, var(--bg-2) 100%); border: 1px solid var(--gold);
    padding: 32px; max-width: 540px; width: 100%; max-height: 90vh; overflow-y: auto; border-radius: 16px;
    box-shadow: 0 20px 64px rgba(0,0,0,0.6); }

  .div-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 16px; }
  .div-tile { background: var(--bg-2); border: 1px solid var(--line); padding: 18px 12px;
    cursor: pointer; transition: all 0.15s; text-align: center; border-radius: 12px; }
  .div-tile:hover { border-color: var(--gold); background: var(--panel-2); }
  .div-tile.active { border-color: var(--gold); background: rgba(212,168,81,0.1); }
  .div-tile .code { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; color: var(--gold); }
  .div-tile .lbl  { font-size: 10px; color: var(--ink-dim); letter-spacing: 0.15em; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .div-tile .stat-line { font-size: 10px; color: var(--ink-dim); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
  .div-tile.started .code { color: var(--green); }

  .meet-row { display: flex; justify-content: space-between; padding: 14px 18px;
    border-bottom: 1px solid var(--line); align-items: center; gap: 14px; cursor: pointer; transition: background 0.15s; }
  .meet-row:hover { background: var(--panel-2); }
  .meet-row:last-child { border-bottom: 0; }
  .meet-row .name { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; }
  .meet-row .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); margin-top: 3px; }
  .meet-row .code-pill { font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--gold); background: var(--bg-2); padding: 6px 12px; letter-spacing: 0.1em; border-radius: 8px;
    border: 1px solid var(--line); }

  .auth-link { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--ink-dim); }
  .auth-link:hover { color: var(--ink); }

  .tab-btn { padding: 14px 24px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; background: transparent; color: var(--ink-dim);
    border: 0; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-btn:hover { color: var(--ink); }

  .prompt-banner { background: linear-gradient(135deg, rgba(212,168,81,0.12) 0%, rgba(212,168,81,0.04) 100%);
    border: 1px solid var(--gold); border-radius: 12px; padding: 18px 22px;
    display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-bottom: 24px; }

  /* ============================ MOBILE RACE-DAY ============================ */
  .mobile-timer-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; touch-action: manipulation;
    -webkit-user-select: none; user-select: none; overflow: hidden;
  }
  .m-top {
    flex: 0 0 30%;
    display: flex; flex-direction: column; padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
  }
  .m-top-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; gap: 8px;
  }
  .m-back {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; touch-action: manipulation;
  }
  .m-div-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--gold); background: rgba(212,168,81,0.1);
    padding: 6px 12px; border-radius: 6px; letter-spacing: 0.15em;
  }
  .m-clock {
    font-family: 'Bebas Neue', sans-serif;
    background: linear-gradient(180deg, var(--gold-2) 0%, var(--gold) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-size: clamp(48px, 14vw, 96px); line-height: 0.9;
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
    text-align: center;
  }
  .m-counter-row {
    display: flex; justify-content: space-around; align-items: baseline;
    margin-top: 6px; padding-top: 6px;
  }
  .m-counter-block { text-align: center; }
  .m-counter-block .v {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 9vw, 64px);
    line-height: 1; color: var(--gold-2); font-variant-numeric: tabular-nums;
  }
  .m-counter-block .l {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--ink-dim); letter-spacing: 0.2em; text-transform: uppercase;
  }
  .m-tap-zone {
    flex: 1; min-height: 0;
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: #1a1408; border: none; cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
    box-shadow: inset 0 4px 0 rgba(255,255,255,0.15);
  }
  .m-tap-zone:active { background: linear-gradient(180deg, #fff 0%, var(--gold-2) 100%); }
  .m-tap-zone.flash-tap { animation: tapflash 0.15s ease-out; }
  @keyframes tapflash { 0% { background: #fff !important; } 100% {} }
  .m-tap-label { font-size: clamp(48px, 12vw, 88px); line-height: 0.9; margin-bottom: 8px; }
  .m-tap-sub { font-size: 13px; opacity: 0.6; letter-spacing: 0.2em; }
  .m-tap-pop {
    position: absolute; top: 12px; right: 16px;
    font-family: 'Bebas Neue', sans-serif; font-size: 24px;
    background: rgba(26,20,8,0.2); padding: 4px 10px; border-radius: 6px;
    pointer-events: none; opacity: 0;
  }
  .m-tap-pop.show { animation: poprise 1s ease-out; }
  @keyframes poprise {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-30px); }
  }
  .m-start-zone {
    flex: 1; min-height: 0;
    background: linear-gradient(180deg, var(--gold-2) 0%, var(--gold) 100%);
    color: #1a1408; border: none; cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(36px, 11vw, 72px); touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---- Mobile Recorder ---- */
  .mobile-rec-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; touch-action: manipulation;
    overflow: hidden;
  }
  .m-rec-top {
    flex: 0 0 auto; padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
  }
  .m-rec-status {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1;
    text-align: center; padding: 8px 0;
  }
  .m-rec-time {
    font-family: 'JetBrains Mono', monospace; font-size: 15px;
    color: var(--ink-dim); text-align: center; margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .m-rec-display {
    background: var(--bg-2); border: 2px solid var(--gold);
    border-radius: 12px; padding: 18px;
    margin: 12px 0; text-align: center;
    font-family: 'JetBrains Mono', monospace; font-size: 56px;
    font-variant-numeric: tabular-nums; letter-spacing: 0.15em;
    color: var(--gold); min-height: 88px;
  }
  .m-rec-display.empty { color: var(--ink-dim); }
  .m-rec-preview {
    padding: 10px 14px; background: var(--panel); border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0; margin-bottom: 10px;
  }
  .m-rec-preview.mismatch { border-left-color: var(--red); }
  .m-rec-preview .nm { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; }
  .m-rec-preview .mt { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-dim); margin-top: 2px; }
  .m-keypad {
    flex: 1; min-height: 0; display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px; padding: 6px;
  }
  .m-key {
    background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
    border: 1px solid var(--line); border-radius: 12px;
    color: var(--ink); font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 56px); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    transition: background 0.05s;
  }
  .m-key:active { background: var(--gold); color: #1a1408; }
  .m-key.back { color: var(--red); font-size: 28px; }
  .m-key.submit { background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%); color: #1a1408; font-size: 28px; letter-spacing: 0.1em; padding: 18px 0; min-height: 80px; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2); }
  .m-key.submit:active { background: #fff; }
  .m-key.undo { color: var(--ink-dim); font-size: 18px; letter-spacing: 0.1em; }
  .m-key:disabled { opacity: 0.3; }

  .m-rec-preview { position: relative; }
  .m-auto-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--gold);
    width: 0%; transition: width 0.4s linear; border-radius: 0 0 8px 0; }

/* ============================ AUDIO ============================ */
let _audioCtx = null;
function unlockAudio() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === "suspended") _audioCtx.resume();
  } catch (e) {}
}
function playBeep() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _audioCtx;
    if (ctx.state === "suspended") ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(1100, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.06);
    gain.gain.setValueAtTime(0.001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.13);
  } catch (e) {}
  try { if (navigator.vibrate) navigator.vibrate(45); } catch(e){}
}

/* ============================ WAKE LOCK + MOBILE ============================ */
let _wakeLock = null;
async function requestWakeLock() {

    _wakeLock.addEventListener('release', () => { _wakeLock = null; });

}
async function releaseWakeLock() {

}

document.addEventListener('visibilitychange', () => {

function isMobileViewport() { return window.innerWidth < 900; }

/* ============================ HELPERS ============================ */
const pad = (n, w = 2) => String(n).padStart(w, "0");
const fmtTime = (ms) => {
  if (ms == null) return "--:--.--";
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${pad(m)}:${pad(s)}.${pad(cs)}`;
};
const newMeetCode = () => {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let out = "";
  for (let i = 0; i < 6; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
};
const validCode = (s) => /^[A-Z0-9][A-Z0-9-]{1,18}[A-Z0-9]$/.test(s) && s.length >= 3 && s.length <= 20;
const parseCSV = (text) => {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  if (!lines.length) return [];
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
  const idx = n => headers.indexOf(n);
  const iF = idx("first"), iL = idx("last"), iG = idx("grade"), iX = idx("gender");
  if (iF < 0 || iL < 0) return null;
  return lines.slice(1).map(row => {
    const cells = row.split(",").map(c => c.trim());
    return { first: cells[iF]||"", last: cells[iL]||"", grade: cells[iG]||"", gender: cells[iX]||"" };
  });
};
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const $ = (id) => document.getElementById(id);

const normGender = (g) => {
  if (!g) return null;
  const v = g.trim().toUpperCase();
  if (v.startsWith("M") || v.startsWith("B")) return "M";
  if (v.startsWith("F") || v.startsWith("G") || v.startsWith("W")) return "F";
  return null;
};
const divFromRunner = (r) => {
  const g = normGender(r.gender);
  const grade = (r.grade || "").trim();
  if (!g || !grade) return null;
  return `${grade}${g}`;
};
const divLabel = (div) => {
  if (!div) return "Unassigned";
  const m = div.match(/^(\d+|VAR|JV)([MF])$/);
  if (!m) return div;
  const [_, gradePart, gender] = m;
  const genderLbl = gender === "M" ? "Boys" : "Girls";
  if (gradePart === "VAR") return `Varsity ${genderLbl}`;
  if (gradePart === "JV") return `JV ${genderLbl}`;
  return `${genderLbl} Grade ${gradePart}`;
};
const fmtDate = (s) => {
  if (!s) return "";
  const d = new Date(s + "T00:00:00");
  return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
};

/* ============================ AUTH ============================ */
const MeetAuth = {
  tokenKey: (code) => `xc.tok.${code}`,
  get(code)  { return localStorage.getItem(this.tokenKey(code)); },
  set(code, t) { localStorage.setItem(this.tokenKey(code), t); },
  clear(code){ localStorage.removeItem(this.tokenKey(code)); },
  isAuthed(code) { return !!this.get(code); },
};

/* ============================ SCORING ============================ */
function scoreRace(divisionResults, runnersByBib) {
  const sorted = [...divisionResults].sort((a, b) => a.place - b.place);
  const teamFinisherCount = {};
  for (const r of sorted) {
    const runner = runnersByBib[r.bib];
    if (!runner) continue;
    teamFinisherCount[runner.team] = (teamFinisherCount[runner.team] || 0) + 1;
  }
  const scoring = new Set(Object.keys(teamFinisherCount).filter(t => teamFinisherCount[t] >= 5));
  let adj = 0;
  const placed = [];
  for (const r of sorted) {
    const runner = runnersByBib[r.bib];
    if (!runner) continue;
    if (scoring.has(runner.team)) { adj++; placed.push({ ...r, runner, scorePlace: adj }); }
    else { placed.push({ ...r, runner, scorePlace: null }); }
  }
  const byTeam = {};
  for (const p of placed) {
    if (!byTeam[p.runner.team]) byTeam[p.runner.team] = [];
    byTeam[p.runner.team].push(p);
  }
  const teams = Object.keys(byTeam).map(team => {
    const rs = byTeam[team];
    const isScoring = scoring.has(team);
    const top5 = isScoring ? rs.slice(0, 5).map(r => r.scorePlace) : [];
    const total = isScoring ? top5.reduce((a, b) => a + b, 0) : null;
    return { team, finishers: rs.length, isScoring, total,
      sixth: isScoring && rs[5] ? rs[5].scorePlace : null,
      seventh: isScoring && rs[6] ? rs[6].scorePlace : null,
      runners: rs };
  });
  teams.sort((a, b) => {
    if (a.isScoring !== b.isScoring) return a.isScoring ? -1 : 1;
    if (!a.isScoring) return a.team.localeCompare(b.team);
    if (a.total !== b.total) return a.total - b.total;
    if (a.sixth && b.sixth && a.sixth !== b.sixth) return a.sixth - b.sixth;
    if (a.seventh && b.seventh) return a.seventh - b.seventh;
    return 0;
  });
  let rank = 0;
  return teams.map(t => ({ ...t, rank: t.isScoring ? ++rank : null }));
}

/* ============================ STATE ============================ */
const State = {
  route: { name: "landing" },
  user: null, isAdmin: false, admin: null,
  meet: null,
  teams: [], runners: [], runnersByBib: {},
  races: [], taps: [], results: [],
  leagueMeets: [], myMeets: [], profile: null,
  selectedDivision: null,
  channel: null, connected: false, tickTimer: null, loading: false,
};

/* ============================ ROUTING ============================ */
function parseHash() {
  const h = location.hash.replace(/^#\/?/, "");
  if (!h) return { name: "landing" };
  if (h === "create") return { name: "create" };
  if (h === "signin") return { name: "signin" };
  if (h === "me") return { name: "me" };
  if (h === "admin") return { name: "admin" };
  const lm = h.match(/^league\/(.+)$/);
  if (lm) return { name: "league", slug: decodeURIComponent(lm[1]) };
  const m = h.match(/^m\/([A-Z0-9-]{3,20})(\/(details|roster|timer|recorder|results))?(\/([0-9A-Z]+))?$/i);
  if (m) return { name: "meet", code: m[1].toUpperCase(), view: m[3] || "hub", division: m[5] || null };
  return { name: "landing" };
}
function go(path) { location.hash = "#/" + path; }
window.addEventListener("hashchange", handleRoute);

async function handleRoute() {
  const next = parseHash();
  const wasMeet = State.route.name === "meet";
  const wasTimerOrRec = wasMeet && (State.route.view === "timer" || State.route.view === "recorder");
  const sameMeet = wasMeet && next.name === "meet" && next.code === State.route.code;
  State.route = next;
  if (next.division) State.selectedDivision = next.division;

  // Release wake lock when leaving timer/recorder
  const nowTimerOrRec = next.name === "meet" && (next.view === "timer" || next.view === "recorder");
  if (wasTimerOrRec && !nowTimerOrRec) releaseWakeLock();

  if (next.name !== "meet" && wasMeet) await teardownMeet();
  if (next.name === "meet" && !sameMeet) { State.loading = true; render(); await loadMeet(next.code); State.loading = false; }
  else if (next.name === "league") { State.loading = true; render(); await loadLeague(next.slug); State.loading = false; }
  else if (next.name === "me") { State.loading = true; render(); await loadMyMeets(); State.loading = false; }
  else if (next.name === "admin") { State.loading = true; render(); await loadAdminData(); State.loading = false; }
  render();
}

async function loadMeet(code) {
  await teardownMeet();
  setConnected(false);
  const { data: meet, error } = await sb.from("public_meets").select("*").eq("code", code).maybeSingle();
  if (error) console.error("loadMeet:", error);
  State.meet = meet || null;
  if (!meet) { render(); return; }
  const [t, r, rc, tp, rs] = await Promise.all([
    sb.from("teams").select("*").eq("meet_code", code).order("team_index"),
    sb.from("runners").select("*").eq("meet_code", code).order("bib"),
    sb.from("races").select("*").eq("meet_code", code).order("division"),
    sb.from("taps").select("*").eq("meet_code", code),
    sb.from("results").select("*").eq("meet_code", code),
  ]);
  State.teams = t.data || [];
  State.runners = r.data || [];
  State.runnersByBib = Object.fromEntries((r.data || []).map(x => [x.bib, {
    bib: x.bib, first: x.first_name, last: x.last_name, grade: x.grade,
    gender: x.gender, team: x.team
  }]));
  State.races = rc.data || [];
  State.taps = tp.data || [];
  State.results = rs.data || [];
  State.channel = sb.channel(`meet:${code}`)
    .on("postgres_changes", { event: "*", schema: "public", table: "meets",   filter: `code=eq.${code}` },      handleMeetChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "teams",   filter: `meet_code=eq.${code}` }, handleTeamChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "runners", filter: `meet_code=eq.${code}` }, handleRunnerChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "races",   filter: `meet_code=eq.${code}` }, handleRaceChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "taps",    filter: `meet_code=eq.${code}` }, handleTapChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "results", filter: `meet_code=eq.${code}` }, handleResultChange)
    .subscribe((status) => { setConnected(status === "SUBSCRIBED"); });
}
async function loadLeague(slug) {
  const normalized = slug.toLowerCase();
  const { data } = await sb.from("public_meets").select("*").eq("league", normalized).order("meet_date", { ascending: false });
  State.leagueMeets = data || [];
}
async function loadMyMeets() {
  if (!State.user) { State.myMeets = []; State.profile = null; return; }
  const [{ data: meets }, { data: profile }] = await Promise.all([
    sb.rpc("my_meets"),
    sb.rpc("my_profile"),
  ]);
  State.myMeets = meets || [];
  State.profile = profile?.[0] || null;
}
async function loadAdminData() {
  if (!State.user) { State.admin = null; return; }
  const { data: isAdminData } = await sb.rpc("is_admin");
  State.isAdmin = !!isAdminData;
  if (!State.isAdmin) { State.admin = { unauthorized: true }; return; }
  const [stats, users, meets, activity, invites] = await Promise.all([
    sb.rpc("admin_stats"),
    sb.rpc("admin_list_users"),
    sb.rpc("admin_list_meets"),
    sb.rpc("admin_daily_activity"),
    sb.rpc("admin_list_invites"),
  ]);
  State.admin = {
    stats: stats.data?.[0] || null,
    users: users.data || [], meets: meets.data || [],
    activity: activity.data || [], invites: invites.data || [],
  };
}

async function teardownMeet() {
  if (State.channel) { await sb.removeChannel(State.channel); State.channel = null; }
  if (State.tickTimer) { clearInterval(State.tickTimer); State.tickTimer = null; }
  setConnected(false);
}
function setConnected(b) {
  State.connected = b;
  const el = document.querySelector(".conn");
  if (el) {
    el.classList.toggle("live", b);
    const txt = el.querySelector(".conn-text");
    if (txt) txt.textContent = b ? "LIVE" : "OFFLINE";
  }
}

function handleMeetChange(p) {
  if (p.eventType === "DELETE") { State.meet = null; render(); return; }
  const { password_hash, ...rest } = p.new || {};
  State.meet = { ...State.meet, ...rest };
  render();
}
function handleTeamChange(p) {
  if (p.eventType === "INSERT") { if (!State.teams.find(t => t.name === p.new.name)) State.teams.push(p.new); }
  else if (p.eventType === "DELETE") State.teams = State.teams.filter(t => t.name !== p.old.name);
  State.teams.sort((a, b) => a.team_index - b.team_index); render();
}
function handleRunnerChange(p) {
  if (p.eventType === "INSERT") {
    if (!State.runnersByBib[p.new.bib]) {
      State.runners.push(p.new);
      State.runnersByBib[p.new.bib] = { bib: p.new.bib, first: p.new.first_name, last: p.new.last_name, grade: p.new.grade, gender: p.new.gender, team: p.new.team };
    }
  } else if (p.eventType === "DELETE") {
    State.runners = State.runners.filter(r => r.bib !== p.old.bib);
    delete State.runnersByBib[p.old.bib];
  }
  State.runners.sort((a, b) => a.bib.localeCompare(b.bib)); render();
}
function handleRaceChange(p) {
  if (p.eventType === "INSERT") { if (!State.races.find(r => r.division === p.new.division)) State.races.push(p.new); }
  else if (p.eventType === "UPDATE") {
    const i = State.races.findIndex(r => r.division === p.new.division);
    if (i >= 0) State.races[i] = p.new;
  } else if (p.eventType === "DELETE") State.races = State.races.filter(r => r.division !== p.old.division);
  State.races.sort((a,b) => a.division.localeCompare(b.division)); render();
}
function handleTapChange(p) {
  if (p.eventType === "INSERT") {
    const exists = State.taps.find(t => t.division === p.new.division && t.place === p.new.place);
    if (!exists) State.taps.push(p.new);
  } else if (p.eventType === "DELETE") {
    State.taps = State.taps.filter(t => !(t.division === p.old.division && t.place === p.old.place));
  }
  render();
}
function handleResultChange(p) {
  if (p.eventType === "INSERT") {
    const exists = State.results.find(r => r.division === p.new.division && r.place === p.new.place);
    if (!exists) State.results.push(p.new);
  } else if (p.eventType === "DELETE") {
    State.results = State.results.filter(r => !(r.division === p.old.division && r.place === p.old.place));
  }
  render();
}
function tapsForDiv(div) { return State.taps.filter(t => t.division === div).sort((a,b)=>a.place-b.place); }
function resultsForDiv(div) { return State.results.filter(r => r.division === div).sort((a,b)=>a.place-b.place); }
function raceFor(div) { return State.races.find(r => r.division === div); }
function computeDivisions() {
  const set = new Map();
  for (const r of State.runners) {
    const d = divFromRunner(r);
    if (!d) continue;
    set.set(d, (set.get(d) || 0) + 1);
  }
  return [...set.entries()].map(([division, count]) => ({ division, label: divLabel(division), count }))
    .sort((a,b) => a.division.localeCompare(b.division));
}

/* ============================ MEET PASSWORD MODAL ============================ */
function ensureAuth(code, onAuthed) {
  if (MeetAuth.isAuthed(code)) { onAuthed(); return; }
  showMeetLoginModal(code, onAuthed);
}
function showMeetLoginModal(code, onAuthed) {
  const root = $("modal-root");
  root.innerHTML = `
    <div class="modal-back" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="mono" style="font-size:10px;color:var(--gold);letter-spacing:0.25em;margin-bottom:8px;">DIRECTOR ACCESS</div>
        <div class="display" style="font-size:36px;margin-bottom:6px;">UNLOCK</div>
        <div class="ui" style="font-size:13px;color:var(--ink-dim);margin-bottom:22px;">
          Enter the director password to enable writes on this device.
        </div>
        <div class="field-label">Password</div>
        <input id="auth-pwd" type="password" class="field-input" autofocus />
        <div id="auth-err" class="err" style="display:none;"></div>
        <div style="display:flex;gap:10px;margin-top:18px;">
          <button id="auth-submit" class="btn btn-primary">Unlock →</button>
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>`;
  const submit = async () => {
    const pwd = $("auth-pwd").value;
    if (!pwd) return;
    const errEl = $("auth-err"); errEl.style.display = "none";
    $("auth-submit").disabled = true; $("auth-submit").textContent = "Verifying…";
    const { data: token, error } = await sb.rpc("login_meet", { p_code: code, p_password: pwd });
    if (error || !token) {
      errEl.textContent = "⚠ " + (error?.message || "Login failed");
      errEl.style.display = "block";
      $("auth-submit").disabled = false; $("auth-submit").textContent = "Unlock →";
      return;
    }
    MeetAuth.set(code, token);
    closeModal();
    render();
    onAuthed();
  };
  $("auth-submit").addEventListener("click", submit);
  $("auth-pwd").addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
}
function closeModal() { $("modal-root").innerHTML = ""; }
function meetLogout() {
  if (!confirm("Lock this device?")) return;
  MeetAuth.clear(State.meet.code);
  render();
}

/* ============================ SUPABASE AUTH ============================ */
sb.auth.onAuthStateChange((event, session) => {
  State.user = session?.user || null;
  checkAdminStatus();
  loadProfileIfSignedIn();
  if (State.route.name === "me") loadMyMeets().then(render);
  else if (State.route.name === "admin") loadAdminData().then(render);
  else render();
});
async function checkAdminStatus() {
  if (!State.user) { State.isAdmin = false; return; }
  try {
    const { data } = await sb.rpc("is_admin");
    State.isAdmin = !!data;
  } catch { State.isAdmin = false; }
}
async function initAuth() {
  const { data } = await sb.auth.getSession();
  State.user = data.session?.user || null;
  await checkAdminStatus();
  await loadProfileIfSignedIn();
}

async function loadProfileIfSignedIn() {
  if (!State.user) { State.profile = null; return; }
  try {
    const { data } = await sb.rpc("my_profile");
    State.profile = data?.[0] || null;
  } catch { State.profile = null; }
}

async function signInWithPassword(email, password) {
  const { error } = await sb.auth.signInWithPassword({ email: email.toLowerCase(), password });
  return error;
}

async function signUpWithInvite(email, password, invite, fullName, school) {
  const { error: checkErr } = await sb.rpc("check_invite", { p_invite: invite.toUpperCase() });
  if (checkErr) return checkErr;
  const { data, error: signUpErr } = await sb.auth.signUp({ email: email.toLowerCase(), password });
  if (signUpErr) { console.error("signUp:", signUpErr); return signUpErr; }
  if (data?.user && !data?.session) {
    return new Error("Account created but no session. Disable 'Confirm email' in Supabase Auth → Sign In / Providers → Email.");
  }
  const signInErr = await signInWithPassword(email, password);
  if (signInErr) return signInErr;
  // Save profile
  if (fullName || school) {
    const { error: profErr } = await sb.rpc("set_my_profile", { p_full_name: fullName || "", p_school: school || "" });

  return null;
}

async function doPasswordSignIn() {
  const email = $("auth-email").value.trim();
  const pwd = $("auth-pwd").value;
  const errEl = $("auth-err"), okEl = $("auth-ok");
  errEl.style.display = "none"; okEl.style.display = "none";
  if (!email || !/^.+@.+\..+$/.test(email)) {
    errEl.textContent = "⚠ Enter a valid email."; errEl.style.display = "block"; return;
  }
  if (!pwd) { errEl.textContent = "⚠ Enter your password."; errEl.style.display = "block"; return; }
  const btn = $("auth-btn");
  btn.disabled = true; btn.textContent = "Signing in…";
  const err = await signInWithPassword(email, pwd);
  if (err) {
    errEl.textContent = "⚠ " + (err.message || "Sign-in failed");
    errEl.style.display = "block";
    btn.disabled = false; btn.textContent = "Sign In →";
    return;
  }
  okEl.textContent = "✓ Signed in. Redirecting…"; okEl.style.display = "block";
  setTimeout(() => go(""), 400);
}
async function doSignUp() {
  const invite = $("auth-invite").value.trim().toUpperCase();
  const name = $("auth-name").value.trim();
  const school = $("auth-school").value.trim();
  const email = $("auth-email").value.trim();
  const pwd  = $("auth-pwd").value;
  const pwd2 = $("auth-pwd2").value;
  const errEl = $("auth-err"), okEl = $("auth-ok");
  errEl.style.display = "none"; okEl.style.display = "none";
  const showErr = (msg) => { errEl.textContent = "⚠ " + msg; errEl.style.display = "block"; };
  if (!invite || invite.length < 4) return showErr("Enter your invite code.");
  if (!email || !/^.+@.+\..+$/.test(email)) return showErr("Enter a valid email.");
  if (!pwd || pwd.length < 6) return showErr("Password must be at least 6 characters.");
  if (pwd !== pwd2) return showErr("Passwords don't match.");
  const btn = $("auth-btn");
  btn.disabled = true; btn.textContent = "Creating account…";
  const err = await signUpWithInvite(email, pwd, invite, name, school);
  if (err) { showErr(err.message || "Sign-up failed"); btn.disabled = false; btn.textContent = "Sign Up →"; return; }
  okEl.textContent = "✓ Account created. Redirecting…"; okEl.style.display = "block";
  setTimeout(() => go(""), 400);
}

function doExportAdminMeets() {
  const meets = State.admin?.meets || [];
  if (meets.length === 0) return alert("No meets to export.");
  const rows = [["Code","Name","League","Owner Email","Course","Location","Distance","Date","Status","Created","Runners","Results"]];
  for (const m of meets) {
    rows.push([m.code, m.name, m.league || "", m.owner_email || "anonymous",
      m.course_name || "", m.location || "", m.distance || "",
      m.meet_date || "", m.status, new Date(m.created_at).toISOString(),
      m.runner_count, m.result_count]);
  }
  downloadCSV(`xc_chrono_all_meets_${new Date().toISOString().slice(0,10)}.csv`, rows);
}
async function doGenerateInvites() {
  const note = $("invite-note").value.trim() || null;
  const count = parseInt($("invite-count").value || "1", 10);
  if (count < 1 || count > 50) return alert("Count must be 1-50.");
  const { data, error } = await sb.rpc("admin_create_invite", { p_count: count, p_note: note });
  if (error) return alert("Failed: " + error.message);
  const codes = (data || []).map(d => d.code);
  $("modal-root").innerHTML = `
    <div class="modal-back" onclick="if(event.target===this)closeModal()">

        <div class="display" style="font-size:32px;color:var(--gold-2);margin-bottom:10px;">✓ INVITES CREATED</div>

async function copyInvites(s) {
  try { await navigator.clipboard.writeText(s.replace(/,/g, "\n")); alert("Copied."); }
  catch { prompt("Copy:", s.replace(/,/g, "\n")); }
}
async function doRevokeInvite(code) {
  if (!confirm(`Revoke invite ${code}?`)) return;
  const { error } = await sb.rpc("admin_revoke_invite", { p_code: code });
  if (error) return alert("Failed: " + error.message);
  await loadAdminData(); render();
}

async function doCleanupInvites(mode) {
  let msg = "";
  if (mode === "used") msg = "Delete all USED invite records? This removes history of who claimed which codes, but doesn't affect existing accounts.";
  else if (mode === "unused") msg = "Revoke ALL unused invite codes? Any pending invites will stop working.";
  else if (mode === "expired") msg = "Delete all expired unused invite codes?";
  if (!confirm(msg)) return;
  const { data, error } = await sb.rpc("admin_cleanup_invites", { p_mode: mode });
  if (error) return alert("Failed: " + error.message);
  alert(`Removed ${data || 0} invite${data===1?"":"s"}.`);
  await loadAdminData(); render();
}

async function adminResetPwd(userId, email) {
  const newPwd = prompt(`Reset password for ${email}?\n\nEnter a new password (6+ chars). The user will need to use this to sign in.`);
  if (!newPwd) return;
  if (newPwd.length < 6) return alert("Password must be at least 6 characters.");
  const { error } = await sb.rpc("admin_reset_password", { p_user_id: userId, p_new_password: newPwd });
  if (error) return alert("Failed: " + error.message);
  alert(`✓ Password reset for ${email}. New password: ${newPwd}\n\nMake sure to communicate this to the user securely.`);
}

async function adminDisableUser(userId, email) {
  if (!confirm(`Disable user ${email}?\n\nThey won't be able to sign in, but their meets and account stay visible. You can reactivate them anytime.`)) return;
  const { error } = await sb.rpc("admin_delete_user", { p_user_id: userId });
  if (error) return alert("Failed: " + error.message);
  alert(`✓ User ${email} disabled.`);
  await loadAdminData(); render();
}

async function adminReactivateUser(userId, email) {
  if (!confirm(`Reactivate user ${email}? They'll be able to sign in again.`)) return;
  const { error } = await sb.rpc("admin_reactivate_user", { p_user_id: userId });
  if (error) return alert("Failed: " + error.message);
  alert(`✓ User ${email} reactivated.`);
  await loadAdminData(); render();
}

async function doCreate() {
  const errEl = $("create-err"); errEl.style.display = "none";
  const show = (msg) => { errEl.textContent = "⚠ " + msg; errEl.style.display = "block"; };
  let code = ($("meet-code").value || "").trim().toUpperCase();
  const name = ($("meet-name").value || "").trim() || "Untitled Meet";
  const league = ($("meet-league").value || "").trim();
  const pwd  = $("meet-pwd").value;
  const pwd2 = $("meet-pwd2").value;
  if (!validCode(code)) return show("Code must be 3–20 chars: letters, numbers, dashes.");
  if (!pwd || pwd.length < 4) return show("Password must be at least 4 characters.");
  if (pwd !== pwd2) return show("Passwords don't match.");
  const btn = $("create-btn");
  btn.disabled = true; btn.textContent = "Creating…";
  const { data: token, error } = await sb.rpc("create_meet", { p_code: code, p_name: name, p_password: pwd, p_league: league });
  if (error || !token) { show(error?.message || "Could not create meet."); btn.disabled = false; btn.textContent = "Create →"; return; }
  MeetAuth.set(code, token);
  go(`m/${code}`);
}

async function doUploadRoster() {
  const code = State.meet.code; const token = MeetAuth.get(code);
  if (!token) return ensureAuth(code, doUploadRoster);
  const errEl = $("r-err"), okEl = $("r-ok");
  errEl.style.display = "none"; okEl.style.display = "none";
  const showErr = (msg) => { errEl.textContent = "⚠ " + msg; errEl.style.display = "block"; };
  const showOk  = (msg) => { okEl.textContent  = "✓ " + msg; okEl.style.display  = "block"; };
  const school = ($("r-school").value || "").trim();
  if (!school) return showErr("Enter a school name first.");
  const csv = $("r-csv").value;
  const parsed = parseCSV(csv);
  if (parsed === null) return showErr("CSV must have headers: first, last, grade, gender");
  if (!parsed || parsed.length === 0) return showErr("No rows found.");
  const btn = $("r-submit");
  btn.disabled = true; btn.textContent = "Uploading…";
  try {
    const { data: teamIdx, error: teamErr } = await sb.rpc("register_team", { p_token: token, p_meet: code, p_team: school });
    if (teamErr) throw teamErr;
    const existingForTeam = State.runners.filter(r => r.team === school).map(r => parseInt(r.bib, 10));
    let nextBib = existingForTeam.length ? Math.max(...existingForTeam) + 1 : teamIdx * 1000 + 1;
    const rows = parsed.map(p => ({
      bib: pad(nextBib++, 4),
      first_name: p.first, last_name: p.last,
      grade: p.grade, gender: p.gender, team: school
    }));
    const { error: insErr } = await sb.rpc("add_runners", { p_token: token, p_meet: code, p_runners: rows });
    if (insErr) throw insErr;
    const newDivs = new Set();
    for (const r of rows) { const d = divFromRunner(r); if (d && !State.races.find(x => x.division === d)) newDivs.add(d); }
    for (const d of newDivs) {
      await sb.rpc("register_race", { p_token: token, p_meet: code, p_division: d, p_label: divLabel(d) });
    }
    if (!State.teams.find(t => t.name === school)) {
      State.teams.push({ meet_code: code, name: school, team_index: teamIdx });
      State.teams.sort((a,b) => a.team_index - b.team_index);
    }
    for (const r of rows) {
      if (!State.runnersByBib[r.bib]) {
        State.runners.push({ ...r, meet_code: code });
        State.runnersByBib[r.bib] = { bib: r.bib, first: r.first_name, last: r.last_name, grade: r.grade, gender: r.gender, team: r.team };
      }
    }
    State.runners.sort((a,b) => a.bib.localeCompare(b.bib));
    for (const d of newDivs) {
      if (!State.races.find(x => x.division === d)) {
        State.races.push({ meet_code: code, division: d, label: divLabel(d), start_time: null });
      }
    }
    showOk(`Added ${rows.length} runner${rows.length === 1 ? "" : "s"} to ${school}.`);
    renderRoster();
  } catch (e) {
    if (e?.message?.includes("Not authorized")) {
      MeetAuth.clear(code); showErr("Session expired. Please unlock again.");
      ensureAuth(code, () => {});
    } else { showErr(e.message || "Upload failed."); }
  } finally {
    const submitBtn = $("r-submit");
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Assign Bibs →"; }
  }
}

function attachTapHandler(tapBtn, div, code, isMobile) {
  if (!tapBtn) return;
  let cooling = false;
  tapBtn.addEventListener("click", async () => {
    if (cooling) return;
    cooling = true;
    setTimeout(() => cooling = false, 100);
    playBeep();
    if (isMobile) tapBtn.classList.add("flash-tap");
    else tapBtn.classList.add("flash");
    setTimeout(() => tapBtn.classList.remove(isMobile ? "flash-tap" : "flash"), 400);

    const token = MeetAuth.get(code);
    if (!token) return ensureAuth(code, () => {});
    const r = raceFor(div);
    if (!r?.start_time) return;
    const t = Date.now() - r.start_time;

    const nextPlace = tapsForDiv(div).length + 1;
    State.taps.push({ meet_code: code, division: div, place: nextPlace, time_ms: t });
    const counter = $("tap-count");
    if (counter) {
      counter.textContent = nextPlace;
      counter.classList.remove("pop");
      void counter.offsetWidth;
      counter.classList.add("pop");
    }
    if (isMobile) {
      const pop = $("tap-pop");
      if (pop) {
        pop.textContent = `+${nextPlace}`;
        pop.classList.remove("show");
        void pop.offsetWidth;
        pop.classList.add("show");
      }
    } else {
      render();
    }

    const { error } = await sb.rpc("add_tap", { p_token: token, p_meet: code, p_division: div, p_time_ms: t });
    if (error) {
      console.error("tap failed", error);
      State.taps = State.taps.filter(x => !(x.division === div && x.place === nextPlace));
      if (!isMobile) render();
      if (error.message?.includes("Not authorized")) {
        MeetAuth.clear(code);
        alert("Session expired.");
        ensureAuth(code, () => render());
      }
    }
  });
}

function renderCompletedNotice() {
  const code = State.meet.code;
  $("app").innerHTML = `
    ${header("MEET COMPLETED", `<button class="btn btn-ghost btn-sm" onclick="go('m/${code}')">← Hub</button>`)}

      <div class="display" style="font-size:64px;color:var(--green);">✓ COMPLETED</div>
      <div class="ui" style="color:var(--ink-dim);margin-top:12px;">This meet is marked complete.</div>
      <div style="margin-top:24px;"><button class="btn btn-primary" onclick="go('m/${code}/results')">View Results →</button></div>
    </div>`;
}

async function doStartRace(div) {
  const code = State.meet.code; const token = MeetAuth.get(code);
  if (!token) return ensureAuth(code, () => doStartRace(div));
  unlockAudio();
  const t = Date.now();
  const existing = raceFor(div);
  if (existing) existing.start_time = t;
  else State.races.push({ meet_code: code, division: div, label: divLabel(div), start_time: t });
  render();
  const { error } = await sb.rpc("start_race", { p_token: token, p_meet: code, p_division: div, p_start_time: t });
  if (error) { alert("Failed: " + error.message); const e2 = raceFor(div); if (e2) e2.start_time = null; render(); }
}
async function doResetRace(div) {
  if (!confirm(`Reset ${divLabel(div)} race? Clears taps and finishes.`)) return;
  const code = State.meet.code; const token = MeetAuth.get(code);
  if (!token) return ensureAuth(code, () => doResetRace(div));
  const r = raceFor(div); if (r) r.start_time = null;
  State.taps = State.taps.filter(t => t.division !== div);
  State.results = State.results.filter(x => x.division !== div);
  render();
  const { error } = await sb.rpc("reset_race", { p_token: token, p_meet: code, p_division: div });
  if (error) { alert("Failed: " + error.message); await loadMeet(code); render(); }
}

/* ============================ RECORDER ============================ */
function renderRecorder() {
  const code = State.meet.code;
  if (!MeetAuth.isAuthed(code)) { ensureAuth(code, () => render()); }
  if (State.meet.status === "completed") return renderCompletedNotice();
  const div = State.route.division;
  if (!div) return renderDivPicker("recorder");
  if (isMobileViewport()) return renderRecorderMobile(div);
  return renderRecorderDesktop(div);
}

let _mobileBibBuffer = "";
let _mobileInputMode = (localStorage.getItem("xc.recorderInputMode") || "keypad"); // "keypad" or "native"
let _mobileAutoRecord = (localStorage.getItem("xc.recorderAutoRecord") || "on") === "on";
let _autoRecordTimer = null;

function setRecorderInputMode(mode) {
  _mobileInputMode = mode;
  localStorage.setItem("xc.recorderInputMode", mode);
  _mobileBibBuffer = "";
  cancelAutoRecord();
  renderRecorderMobile(State.route.division);
}

function toggleAutoRecord() {
  _mobileAutoRecord = !_mobileAutoRecord;
  localStorage.setItem("xc.recorderAutoRecord", _mobileAutoRecord ? "on" : "off");
  cancelAutoRecord();
  renderRecorderMobile(State.route.division);
}

function cancelAutoRecord() {
  if (_autoRecordTimer) { clearTimeout(_autoRecordTimer); _autoRecordTimer = null; }
  const bar = document.querySelector(".m-auto-bar");
  if (bar) bar.classList.remove("go");
}

function maybeAutoRecord(div) {
  cancelAutoRecord();
  if (!_mobileAutoRecord) return;
  if (_mobileBibBuffer.length !== 4) return;
  const bib = _mobileBibBuffer;
  const runner = State.runnersByBib[bib];
  if (!runner) return; // unknown bib, don't auto
  // Don't auto on duplicate (already recorded)
  if (State.results.find(r => r.division === div && r.bib === bib)) return;
  // Don't auto on division mismatch — require manual confirm for safety
  const runnerDiv = divFromRunner(runner);
  if (runnerDiv && runnerDiv !== div) return;
  // Need a tap to match against
  const taps = tapsForDiv(div);
  const nextPlace = resultsForDiv(div).length + 1;
  const nextTap = taps.find(t => t.place === nextPlace);
  if (!nextTap) return;

  // Trigger the progress bar
  setTimeout(() => {
    const bar = document.querySelector(".m-auto-bar");
    if (bar) bar.classList.add("go");
  }, 10);

  _autoRecordTimer = setTimeout(() => {
    // Final safety check — buffer must still match what we started for
    if (_mobileBibBuffer === bib) {
      mobileBibSubmit(div);
    }
    _autoRecordTimer = null;
  }, 400);
}

function renderRecorderMobile(div) {
  const code = State.meet.code;

  const results = resultsForDiv(div);
  const nextPlace = results.length + 1;
  const nextTap = taps.find(t => t.place === nextPlace);

  const buf = _mobileBibBuffer.padStart(4, "0");

  $("app").innerHTML = `

          <button class="m-back" onclick="_mobileBibBuffer='';go('m/${code}')">← Hub</button>
          <span class="m-div-pill">${div} · ${esc(divLabel(div))}</span>
          <button class="m-back" onclick="_mobileBibBuffer='';go('m/${code}/recorder')">↺ Race</button>
        </div>
        <div class="m-rec-status">PLACE <span style="color:var(--gold);">${pad(nextPlace, 3)}</span></div>
        <div class="m-rec-time">${nextTap ? `⏱ ${fmtTime(nextTap.time_ms)}` : "WAITING FOR TAP…"}</div>
        ${_mobileInputMode === "keypad" ? `

            ${_mobileBibBuffer ? esc(buf) : "0000"}
          </div>` : `
          <input id="m-rec-input" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="0000"
            class="m-rec-display" style="width:100%;outline:none;text-align:center;background:var(--bg-2);"
            value="${esc(_mobileBibBuffer)}" autofocus />`}
        ${previewRunner ? `
          <div class="m-rec-preview ${mismatched?'mismatch':''}">
            <div class="nm">${esc(previewRunner.first)} ${esc(previewRunner.last)}</div>
            <div class="mt">${esc(previewRunner.team)} · DIV ${previewDiv || "—"}${mismatched?` ⚠ should be ${previewDiv}`:''}</div>

          </div>` : ""}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px;flex-wrap:wrap;">

          <button class="m-key" onclick="mobileBibKey('0')">0</button>

          <button class="m-key submit" style="grid-column:1/-1;" onclick="mobileBibSubmit('${div}')" ${(nextTap && _mobileBibBuffer)?'':'disabled'}>RECORD ↵</button>
        </div>` : `
        <div style="padding:16px;display:flex;flex-direction:column;gap:10px;">
          <button class="m-key submit" style="padding:24px;font-size:24px;" onclick="mobileBibSubmit('${div}')" ${(nextTap && _mobileBibBuffer)?'':'disabled'}>RECORD ↵</button>

            Native input uses your phone's number keyboard. Tap the bib field above to type.
          </div>
        </div>`}
    </div>`;

  // Wire up the native input
  if (_mobileInputMode === "native") {
    const inp = $("m-rec-input");
    if (inp) {
      inp.addEventListener("input", (e) => {
        cancelAutoRecord();
        _mobileBibBuffer = e.target.value.replace(/\D/g, "").slice(0, 4);
        // Soft re-render to update preview without losing focus
        updateMobileNativePreview(div);
        setTimeout(() => maybeAutoRecord(div), 20);
      });
      inp.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); cancelAutoRecord(); mobileBibSubmit(div); }
      });
    }
  } else {
    // For keypad mode, trigger auto-record check on initial render too (in case buffer was preserved)
    setTimeout(() => maybeAutoRecord(div), 20);
  }
}

function updateMobileNativePreview(div) {
  const buf = _mobileBibBuffer.padStart(4, "0");
  const previewRunner = _mobileBibBuffer ? State.runnersByBib[buf] : null;
  const previewDiv = previewRunner ? divFromRunner(previewRunner) : null;
  const mismatched = previewRunner && previewDiv && previewDiv !== div;

  const existing = document.querySelector(".m-rec-preview");
  if (existing) existing.remove();

  if (previewRunner) {
    const newPreview = document.createElement("div");
    newPreview.className = "m-rec-preview" + (mismatched ? " mismatch" : "");
    newPreview.innerHTML = `
      <div class="nm">${esc(previewRunner.first)} ${esc(previewRunner.last)}</div>
      <div class="mt">${esc(previewRunner.team)} · DIV ${previewDiv || "—"}${mismatched?` ⚠ should be ${previewDiv}`:''}</div>
      <div class="m-auto-bar"></div>`;
    const inp = $("m-rec-input");
    inp?.parentNode?.insertBefore(newPreview, inp.nextSibling);
  }

  const submitBtn = document.querySelector(".m-key.submit");
  const taps = tapsForDiv(div);
  const nextPlace = resultsForDiv(div).length + 1;
  const nextTap = taps.find(t => t.place === nextPlace);
  if (submitBtn) submitBtn.disabled = !(nextTap && _mobileBibBuffer);
}

function mobileBibKey(k) {
  cancelAutoRecord();
  if (k === 'back') {
    _mobileBibBuffer = _mobileBibBuffer.slice(0, -1);
  } else if (_mobileBibBuffer.length < 4) {
    _mobileBibBuffer += k;
  }
  // Tiny vibration on keypress
  try { if (navigator.vibrate) navigator.vibrate(15); } catch(e){}
  renderRecorderMobile(State.route.division);
  // Schedule auto-record check after re-render
  setTimeout(() => maybeAutoRecord(State.route.division), 20);
}

async function mobileBibSubmit(div) {
  cancelAutoRecord();
  const raw = _mobileBibBuffer;
  if (!raw) return;
  const bib = raw.padStart(4, "0");
  const runner = State.runnersByBib[bib];
  if (!runner) { alert(`No runner with bib ${bib}`); return; }
  if (State.results.find(r => r.division === div && r.bib === bib)) {
    alert(`Bib ${bib} already recorded`); return;
  }
  const runnerDiv = divFromRunner(runner);
  if (runnerDiv && runnerDiv !== div) {
    if (!confirm(`Bib ${bib} (${runner.first} ${runner.last}) belongs to ${runnerDiv}, not ${div}. Record anyway?`)) return;
  }
  const code = State.meet.code;
  const token = MeetAuth.get(code);
  if (!token) return ensureAuth(code, () => mobileBibSubmit(div));
  const nextPlace = resultsForDiv(div).length + 1;
  const nextTap = tapsForDiv(div).find(t => t.place === nextPlace);
  if (!nextTap) { alert("No tap to match yet."); return; }

  State.results.push({ meet_code: code, division: div, place: nextPlace, bib, time_ms: nextTap.time_ms });
  _mobileBibBuffer = "";
  try { if (navigator.vibrate) navigator.vibrate([30, 30, 30]); } catch(e){}
  renderRecorderMobile(div);

  const { error } = await sb.rpc("add_result", { p_token: token, p_meet: code, p_division: div, p_bib: bib });
  if (error) {
    State.results = State.results.filter(r => !(r.division === div && r.place === nextPlace && r.bib === bib));
    renderRecorderMobile(div);
    alert("Failed: " + error.message);
  }
}

async function mobileBibUndo(div) {
  const code = State.meet.code;
  await doUndo(div);
  renderRecorderMobile(div);
}

function updatePreview(div) {
  const input = $("bib-input");
  const preview = $("bib-preview");
  if (!input || !preview) return;
  const v = input.value.padStart(4, "0");
  const runner = State.runnersByBib[v];
  if (input.value && runner) {
    const runnerDiv = divFromRunner(runner);
    const mismatched = runnerDiv && runnerDiv !== div;
    preview.style.display = "block";
    preview.innerHTML = `<div style="padding:14px 18px;background:var(--bg-2);border-left:3px solid ${mismatched?"var(--red)":"var(--green)"};border-radius:8px;">
      <div class="ui" style="font-size:17px;font-weight:600;">${esc(runner.first)} ${esc(runner.last)}</div>
      <div class="mono" style="font-size:12px;color:var(--ink-dim);margin-top:2px;">${esc(runner.team)} · GR ${esc(runner.grade || "—")} · ${esc(runner.gender || "—")} · DIV ${runnerDiv || "—"}</div>
      ${mismatched ? `<div class="mono" style="font-size:11px;color:var(--red);margin-top:6px;">⚠ Runner belongs to ${runnerDiv}, not ${div}.</div>` : ""}
    </div>`;
  } else { preview.style.display = "none"; }
}
async function doRecordBib(div) {
  const code = State.meet.code; const token = MeetAuth.get(code);
  if (!token) return ensureAuth(code, () => doRecordBib(div));
  const errEl = $("rec-err"); errEl.style.display = "none";
  const showErr = (msg) => { errEl.textContent = "⚠ " + msg; errEl.style.display = "block"; };
  const raw = ($("bib-input").value || "").trim();
  if (!raw) return;
  const bib = raw.padStart(4, "0");
  const runner = State.runnersByBib[bib];
  if (!runner) return showErr(`No runner with bib ${bib}`);
  if (State.results.find(r => r.division === div && r.bib === bib)) return showErr(`Bib ${bib} already recorded`);
  const runnerDiv = divFromRunner(runner);
  if (runnerDiv && runnerDiv !== div) {
    if (!confirm(`Bib ${bib} (${runner.first} ${runner.last}) belongs to ${runnerDiv}, not ${div}. Record anyway?`)) return;
  }
  const nextPlace = resultsForDiv(div).length + 1;
  const nextTap = tapsForDiv(div).find(t => t.place === nextPlace);
  if (!nextTap) return showErr("No tap to match yet.");
  const newResult = { meet_code: code, division: div, place: nextPlace, bib, time_ms: nextTap.time_ms };
  State.results.push(newResult);
  $("bib-input").value = "";
  updatePreview(div);
  render();
  $("bib-input")?.focus();
  const { error } = await sb.rpc("add_result", { p_token: token, p_meet: code, p_division: div, p_bib: bib });
  if (error) {
    State.results = State.results.filter(r => !(r.division === div && r.place === nextPlace && r.bib === bib));
    render();
    if (error.message?.includes("Not authorized")) { MeetAuth.clear(code); showErr("Session expired."); ensureAuth(code, () => {}); return; }
    showErr(error.message);
  }
}
async function doUndo(div) {
  const divResults = resultsForDiv(div);
  if (!divResults.length) return;
  const code = State.meet.code; const token = MeetAuth.get(code);
  if (!token) return ensureAuth(code, () => doUndo(div));
  const removed = divResults[divResults.length - 1];
  State.results = State.results.filter(r => !(r.division === div && r.place === removed.place));
  render();
  const { error } = await sb.rpc("undo_result", { p_token: token, p_meet: code, p_division: div });
  if (error) { alert("Failed: " + error.message); State.results.push(removed); render(); }
}

/* ============================ RESULTS ============================ */
const _collapsedDivs = new Set(); // divisions that are collapsed

function toggleResultDiv(div) {
  if (_collapsedDivs.has(div)) _collapsedDivs.delete(div);
  else _collapsedDivs.add(div);
  // Persist for session
  try { sessionStorage.setItem("xc.collapsedDivs", JSON.stringify([..._collapsedDivs])); } catch(e){}
  render();
}
function expandAllResults() {
  _collapsedDivs.clear();
  try { sessionStorage.setItem("xc.collapsedDivs", "[]"); } catch(e){}
  render();
}
function collapseAllResults() {
  const divs = computeDivisions().filter(d => resultsForDiv(d.division).length > 0);
  divs.forEach(d => _collapsedDivs.add(d.division));
  try { sessionStorage.setItem("xc.collapsedDivs", JSON.stringify([..._collapsedDivs])); } catch(e){}
  render();
}
// Restore on load
try {
  const stored = sessionStorage.getItem("xc.collapsedDivs");
  if (stored) JSON.parse(stored).forEach(d => _collapsedDivs.add(d));
} catch(e){}

function renderResults() {
  const code = State.meet.code;
  const divs = computeDivisions().filter(d => resultsForDiv(d.division).length > 0);
  const m = State.meet;
  const publicLink = `${location.origin}${location.pathname}#/m/${code}/results`;
  const isCompleted = m.status === "completed";

  // Default state: latest active race open (most recent finisher activity), rest collapsed.
  // Applied once per meet per session.
  if (divs.length > 1) {
    const firstDefault = sessionStorage.getItem("xc.resultsDefaultApplied");
    if (firstDefault !== code) {
      // Find division with most recent result
      let latestDiv = divs[0].division;
      let latestTs = 0;
      for (const d of divs) {
        const lastResult = resultsForDiv(d.division).slice(-1)[0];
        if (lastResult) {
          const ts = lastResult.recorded_at ? new Date(lastResult.recorded_at).getTime() : 0;
          if (ts >= latestTs) { latestTs = ts; latestDiv = d.division; }
        }
      }
      _collapsedDivs.clear();
      divs.forEach(d => { if (d.division !== latestDiv) _collapsedDivs.add(d.division); });
      sessionStorage.setItem("xc.resultsDefaultApplied", code);
      sessionStorage.setItem("xc.collapsedDivs", JSON.stringify([..._collapsedDivs]));
    }
  }

  $("app").innerHTML = `
    ${header(`RESULTS · ${code}`, `<button class="btn btn-ghost btn-sm" onclick="go('m/${code}')">← Hub</button>`)}
    <div class="wrap">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:16px;">
        <div>
          <div class="mono" style="font-size:11px;color:var(--ink-dim);letter-spacing:0.2em;">${isCompleted?"OFFICIAL FINAL RESULTS":"LIVE RESULTS"}</div>
          <div class="display" style="font-size:72px;line-height:0.95;">${isCompleted?"FINAL":"LIVE"} <span style="background:linear-gradient(135deg,var(--gold),var(--gold-2));-webkit-background-clip:text;background-clip:text;color:transparent;">RESULTS</span></div>
          <div class="ui" style="font-size:13px;color:var(--ink);margin-top:8px;">${esc(m.name)} ${isCompleted?'<span class="status-badge completed">✓ COMPLETED</span>':'<span class="status-badge active">● ACTIVE</span>'}</div>
          ${(m.course_name || m.location || m.distance || m.meet_date) ? `<div class="mono" style="font-size:12px;color:var(--ink-dim);margin-top:4px;">
            ${[m.course_name, m.location, m.distance, fmtDate(m.meet_date)].filter(Boolean).map(esc).join(" · ")}
          </div>` : ""}
          ${m.league ? `<div class="ui" style="margin-top:6px;font-size:13px;"><a href="#/league/${encodeURIComponent(m.league)}">More meets in ${esc(m.league)} →</a></div>` : ""}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
          <button class="btn btn-sm" onclick="doCopyLink('${esc(publicLink)}')">📋 Copy Public Link</button>
          <button class="btn btn-sm" onclick="doExportAllCSV()">⬇ Export All Races (CSV)</button>
        </div>
      </div>
      <div id="link-copied" class="ok" style="display:none;text-align:right;">✓ Link copied.</div>

      ${divs.length > 1 ? `
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" onclick="expandAllResults()">▼ Expand All</button>
          <button class="btn btn-ghost btn-sm" onclick="collapseAllResults()">▶ Collapse All</button>
          <span class="ui" style="font-size:11px;color:var(--ink-dim);align-self:center;margin-left:8px;">Tap any race header to expand/collapse</span>
        </div>` : ""}

      ${divs.length === 0 ? `<div class="panel" style="padding:48px;text-align:center;color:var(--ink-dim);">No results recorded yet.</div>` :
        divs.map(d => renderResultBlock(d.division)).join("")}
    </div>`;
}

function renderResultBlock(div) {
  const divResults = resultsForDiv(div);
  const teamScores = scoreRace(divResults, State.runnersByBib);
  const scorePlaceLookup = {};
  teamScores.forEach(t => t.runners.forEach(r => { scorePlaceLookup[r.bib] = r.scorePlace; }));
  const sorted = [...divResults].sort((a, b) => a.place - b.place);
  const winner = teamScores.find(t => t.rank === 1);
  const isCollapsed = _collapsedDivs.has(div);

  return `
    <div class="result-section ${isCollapsed?'collapsed':''}">
      <div class="result-section-header" onclick="toggleResultDiv('${div}')">
        <div style="flex:1;min-width:0;">
          <div class="display" style="font-size:26px;letter-spacing:0.04em;color:var(--gold-2);">
            <span class="caret">▼</span> ${esc(divLabel(div))} <span style="color:var(--ink-dim);font-size:15px;">[${div}]</span>
          </div>
          <div class="result-section-summary">
            <span>${sorted.length} FINISHERS</span>
            ${winner ? `<span class="winner">🏆 ${esc(winner.team).toUpperCase()} · ${winner.total}</span>` : ""}
            <span>${teamScores.filter(t => t.isScoring).length} SCORING TEAM${teamScores.filter(t => t.isScoring).length===1?'':'S'}</span>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();doExportDivCSV('${div}')">⬇ CSV</button>
      </div>
      <div class="result-section-body">
        <div class="panel" style="margin-bottom:16px;">
          ${teamScores.length === 0 ? `<div class="ui" style="padding:24px;text-align:center;color:var(--ink-dim);">No finishers yet.</div>` : `
          <table>
            <thead><tr><th>RANK</th><th>TEAM</th><th>SCORE</th><th>FINISHERS</th><th>TOP 5</th><th>6TH</th><th>7TH</th></tr></thead>
            <tbody>
              ${teamScores.map(t => `<tr>
                <td>${t.rank ? `<span class="display" style="font-size:32px;color:${t.rank===1?"var(--gold)":"var(--ink)"};">${t.rank===1?"🏆 ":""}${t.rank}</span>` : `<span class="mono" style="font-size:11px;color:var(--ink-dim);">—</span>`}</td>
                <td class="ui" style="font-size:16px;font-weight:600;">${esc(t.team)}</td>
                <td class="display" style="font-size:28px;color:${t.rank===1?"var(--gold)":"var(--ink)"};">${t.isScoring ? t.total : "INC"}</td>
                <td class="mono" style="color:var(--ink-dim);">${t.finishers}</td>
                <td class="mono">${t.isScoring ? t.runners.slice(0,5).map(r=>r.scorePlace).join(" + ") : `<span style="color:var(--ink-dim);">needs 5</span>`}</td>
                <td class="mono" style="color:var(--ink-dim);">${t.sixth || "—"}</td>
                <td class="mono" style="color:var(--ink-dim);">${t.seventh || "—"}</td>
              </tr>`).join("")}
            </tbody>
          </table>`}
        </div>
        ${sorted.length > 0 ? `
        <div class="panel">
          <table>
            <thead><tr><th>PLACE</th><th>SCORE PL</th><th>BIB</th><th>NAME</th><th>TEAM</th><th>GR</th><th>TIME</th></tr></thead>
            <tbody>
              ${sorted.map(r => {
                const runner = State.runnersByBib[r.bib];
                const sp = scorePlaceLookup[r.bib];
                return `<tr>
                  <td class="display" style="font-size:22px;color:${r.place<=3?"var(--gold)":"var(--ink)"};">${r.place}</td>
                  <td class="mono" style="color:${sp?"var(--gold-2)":"var(--ink-dim)"};">${sp || "—"}</td>
                  <td class="mono" style="color:var(--gold);">${esc(r.bib)}</td>
                  <td class="ui">${esc(runner?.first || "")} ${esc(runner?.last || "")}</td>
                  <td class="ui" style="color:var(--ink-dim);">${esc(runner?.team || "")}</td>
                  <td class="mono" style="color:var(--ink-dim);">${esc(runner?.grade || "")}</td>
                  <td class="mono" style="font-variant-numeric:tabular-nums;">${fmtTime(r.time_ms)}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>` : ""}
      </div>
    </div>`;
}
async function doCopyLink(link) {
  try { await navigator.clipboard.writeText(link);
    const el = $("link-copied");
    if (el) { el.style.display = "block"; setTimeout(() => { el.style.display = "none"; }, 2500); }
  } catch (e) { prompt("Copy this link:", link); }
}
function csvEscape(v) {
  const s = String(v ?? "");
  if (/[",\n\r]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}
function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(csvEscape).join(",")).join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function buildCsvForDiv(div) {
  const m = State.meet;
  const divResults = resultsForDiv(div);
  const teamScores = scoreRace(divResults, State.runnersByBib);
  const scorePlaceLookup = {};
  teamScores.forEach(t => t.runners.forEach(r => { scorePlaceLookup[r.bib] = r.scorePlace; }));
  const rows = [];
  rows.push(["Meet", m.name]);
  if (m.course_name) rows.push(["Course", m.course_name]);
  if (m.location) rows.push(["Location", m.location]);
  if (m.distance) rows.push(["Distance", m.distance]);
  if (m.meet_date) rows.push(["Date", m.meet_date]);
  if (m.league) rows.push(["League", m.league]);
  rows.push(["Race", `${divLabel(div)} [${div}]`]);
  rows.push([]);
  rows.push(["TEAM STANDINGS"]);
  rows.push(["Rank", "Team", "Score", "Finishers", "Top 5", "6th", "7th"]);
  for (const t of teamScores) {
    rows.push([t.rank || "", t.team, t.isScoring ? t.total : "INC", t.finishers,
      t.isScoring ? t.runners.slice(0,5).map(r=>r.scorePlace).join("+") : "",
      t.sixth || "", t.seventh || ""]);
  }
  rows.push([]);
  rows.push(["INDIVIDUAL FINISHERS"]);
  rows.push(["Place", "Score Place", "Bib", "First", "Last", "Grade", "Gender", "Team", "Time"]);
  for (const r of [...divResults].sort((a,b)=>a.place-b.place)) {
    const runner = State.runnersByBib[r.bib] || {};
    rows.push([r.place, scorePlaceLookup[r.bib] || "", r.bib,
      runner.first || "", runner.last || "", runner.grade || "",
      runner.gender || "", runner.team || "", fmtTime(r.time_ms)]);
  }
  return rows;
}
function doExportDivCSV(div) {
  const rows = buildCsvForDiv(div);
  const slug = (State.meet.name || "meet").replace(/[^A-Za-z0-9]+/g, "_").slice(0, 40);
  downloadCSV(`${slug}_${div}_results.csv`, rows);
}
function doExportAllCSV() {
  const divs = computeDivisions().filter(d => resultsForDiv(d.division).length > 0);
  if (divs.length === 0) return alert("No results to export.");
  const rows = [];
  for (let i = 0; i < divs.length; i++) {
    if (i > 0) { rows.push([]); rows.push([]); rows.push(["─────"]); rows.push([]); }
    rows.push(...buildCsvForDiv(divs[i].division));
  }
  const slug = (State.meet.name || "meet").replace(/[^A-Za-z0-9]+/g, "_").slice(0, 40);
  downloadCSV(`${slug}_all_results.csv`, rows);
}

/* ============================ BOOT ============================ */
(async function boot() {
  await initAuth();
  await handleRoute();
})();
</script>
</body>
</html>
