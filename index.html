<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>XC Chrono — Cross Country Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111113;
    --panel: #1c1c1f;
    --panel2: #2a2a2e;
    --ink: #f5f5f7;
    --ink-dim: #a1a1a6;
    --line: #38383d;
    --accent: #ffd60a;
    --accent2: #ff9f0a;
    --red: #ff453a;
    --green: #30d158;
    --blue: #0a84ff;
    --header-gold: linear-gradient(90deg, #ffd60a, #ff9f0a, #ffd60a);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { 
    min-height: 100vh;
    background: radial-gradient(circle at 30% 10%, #2a2a2e 0%, var(--bg) 70%);
    color: var(--ink); 
    font-family: 'JetBrains Mono', monospace;
    -webkit-font-smoothing: antialiased; 
  }

  .ui { font-family: 'Inter', sans-serif; }
  .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }

  /* ==================== HEADER ==================== */
  .hdr { 
    border-bottom: 1px solid var(--line); 
    padding: 12px 24px;
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    background: #1c1c1f;
    box-shadow: 0 2px 12px rgba(0,0,0,0.7);
    position: relative;
    z-index: 100;
  }
  .hdr::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--header-gold);
  }

  .hdr .logo { 
    font-family: 'Bebas Neue', sans-serif; 
    font-size: 32px; 
    letter-spacing: -0.03em;
    background: linear-gradient(90deg, #ffd60a, #ff9f0a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hdr .sub { font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.15em; }

  /* NAV BAR */
  .nav-bar {
    background: #1c1c1f;
    padding: 8px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }

  /* PANELS & CARDS */
  .panel { 
    background: var(--panel); 
    border: 1px solid var(--line); 
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .role-card, .div-tile { 
    background: var(--panel2); 
    border: 1px solid var(--line); 
    border-radius: 14px;
    transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .role-card:hover, .div-tile:hover { 
    border-color: var(--accent); 
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(255, 214, 10, 0.2);
  }

  /* BUTTONS */
  .btn { 
    padding: 12px 24px; 
    font-weight: 700; 
    text-transform: uppercase;
    letter-spacing: 0.08em; 
    font-size: 12px; 
    border-radius: 10px;
    transition: all 0.15s;
    cursor: pointer;
  }
  .btn-primary { 
    background: var(--accent); 
    color: #000; 
    border: none;
    font-weight: 800;
  }
  .btn-primary:hover { background: #ffed4a; transform: scale(1.03); }
  .btn-lime { background: var(--accent2); color: #000; border: none; }
  .btn-danger { background: transparent; color: var(--red); border: 2px solid var(--red); }

  /* INPUTS */
  .field-input, .bib-input { 
    background: var(--panel2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--ink);
  }
  .field-input:focus, .bib-input:focus { 
    border-color: var(--accent); 
    box-shadow: 0 0 0 4px rgba(255, 214, 10, 0.15);
  }

  /* CLOCK & TAP BUTTON */
  .clock { 
    font-size: min(240px, 26vw); 
    color: var(--accent);
    text-shadow: 0 6px 25px rgba(255, 214, 10, 0.4);
  }
  .tap-btn { 
    width: 100%; 
    padding: 80px 0; 
    font-size: 88px;
    font-family: 'Bebas Neue', sans-serif; 
    letter-spacing: 0.1em;
    background: var(--accent); 
    color: #000; 
    border: none; 
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(255, 214, 10, 0.5);
  }
  .tap-btn:active { background: #fff; transform: scale(0.96); }

  .start-btn { 
    background: var(--accent2); 
    color: #000; 
    border-radius: 16px;
  }

  /* MISC */
  .conn.live .conn-dot { background: var(--green); box-shadow: 0 0 12px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .lock-badge.unlocked { color: var(--green); border-color: var(--green); }
  .lock-badge.locked { color: var(--ink-dim); }

  table th { background: var(--panel2); }
  .land-hero { 
    font-size: 88px; 
    line-height: 0.95; 
    background: linear-gradient(90deg, #ffd60a, #ff9f0a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .div-tile .code { color: var(--accent); font-size: 48px; }
  .div-tile.started .code { color: var(--green); }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .wrap-narrow { max-width: 640px; margin: 60px auto; padding: 0 24px; }
  .wrap-wide { max-width: 900px; margin: 0 auto; padding: 60px 24px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* ============================ CONFIG ============================ */
const SUPABASE_URL  = "https://twfjsvmwmtnowdehzltz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3Zmpzdm13bXRub3dkZWh6bHR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4OTA5MDcsImV4cCI6MjA5NDQ2NjkwN30.a8Xi7jPE9rDgKf7-8CWGoGIGKQ0I3lJkYs2YWz5JrvY";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  realtime: { params: { eventsPerSecond: 20 } }
});

/* ============================ HELPERS ============================ */
const pad = (n, w = 2) => String(n).padStart(w, "0");
const fmtTime = (ms) => {
  if (ms == null) return "--:--.--";
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${pad(m)}:${pad(s)}.${pad(cs)}`;
};
const newMeetCode = () => {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let out = "";
  for (let i = 0; i < 6; i++) out += chars[Math.floor(Math.random() * chars.length)];
  return out;
};
const parseCSV = (text) => {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  if (!lines.length) return [];
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
  const idx = n => headers.indexOf(n);
  const iF = idx("first"), iL = idx("last"), iG = idx("grade"), iX = idx("gender");
  if (iF < 0 || iL < 0) return null;
  return lines.slice(1).map(row => {
    const cells = row.split(",").map(c => c.trim());
    return { first: cells[iF]||"", last: cells[iL]||"", grade: cells[iG]||"", gender: cells[iX]||"" };
  });
};
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const $ = (id) => document.getElementById(id);

/* Division logic */
const normGender = (g) => {
  if (!g) return null;
  const v = g.trim().toUpperCase();
  if (v.startsWith("M") || v.startsWith("B")) return "M";
  if (v.startsWith("F") || v.startsWith("G") || v.startsWith("W")) return "F";
  return null;
};
const divFromRunner = (r) => {
  const g = normGender(r.gender);
  const grade = (r.grade || "").trim();
  if (!g || !grade) return null;
  return `${grade}${g}`;
};
const divLabel = (div) => {
  if (!div) return "Unassigned";
  const m = div.match(/^(\d+|VAR|JV)([MF])$/);
  if (!m) return div;
  const [_, gradePart, gender] = m;
  const genderLbl = gender === "M" ? "Boys" : "Girls";
  if (gradePart === "VAR") return `Varsity ${genderLbl}`;
  if (gradePart === "JV") return `JV ${genderLbl}`;
  return `${genderLbl} Grade ${gradePart}`;
};
const fmtDate = (s) => {
  if (!s) return "";
  const d = new Date(s + "T00:00:00");
  return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
};

/* ============================ AUTH ============================ */
const Auth = {
  tokenKey: (code) => `xc.tok.${code}`,
  get(code)  { return localStorage.getItem(this.tokenKey(code)); },
  set(code, t) { localStorage.setItem(this.tokenKey(code), t); },
  clear(code){ localStorage.removeItem(this.tokenKey(code)); },
  isAuthed(code) { return !!this.get(code); },
};

/* ============================ SCORING ============================ */
function scoreRace(divisionResults, runnersByBib) {
  const sorted = [...divisionResults].sort((a, b) => a.place - b.place);
  const teamFinisherCount = {};
  for (const r of sorted) {
    const runner = runnersByBib[r.bib];
    if (!runner) continue;
    teamFinisherCount[runner.team] = (teamFinisherCount[runner.team] || 0) + 1;
  }
  const scoring = new Set(Object.keys(teamFinisherCount).filter(t => teamFinisherCount[t] >= 5));

  let adj = 0;
  const placed = [];
  for (const r of sorted) {
    const runner = runnersByBib[r.bib];
    if (!runner) continue;
    if (scoring.has(runner.team)) { adj++; placed.push({ ...r, runner, scorePlace: adj }); }
    else { placed.push({ ...r, runner, scorePlace: null }); }
  }

  const byTeam = {};
  for (const p of placed) {
    if (!byTeam[p.runner.team]) byTeam[p.runner.team] = [];
    byTeam[p.runner.team].push(p);
  }

  const teams = Object.keys(byTeam).map(team => {
    const rs = byTeam[team];
    const isScoring = scoring.has(team);
    const top5 = isScoring ? rs.slice(0, 5).map(r => r.scorePlace) : [];
    const total = isScoring ? top5.reduce((a, b) => a + b, 0) : null;
    return { team, finishers: rs.length, isScoring, total,
      sixth: isScoring && rs[5] ? rs[5].scorePlace : null,
      seventh: isScoring && rs[6] ? rs[6].scorePlace : null,
      runners: rs };
  });

  teams.sort((a, b) => {
    if (a.isScoring !== b.isScoring) return a.isScoring ? -1 : 1;
    if (!a.isScoring) return a.team.localeCompare(b.team);
    if (a.total !== b.total) return a.total - b.total;
    if (a.sixth && b.sixth && a.sixth !== b.sixth) return a.sixth - b.sixth;
    if (a.seventh && b.seventh) return a.seventh - b.seventh;
    return 0;
  });

  let rank = 0;
  return teams.map(t => ({ ...t, rank: t.isScoring ? ++rank : null }));
}

/* ============================ STATE ============================ */
const State = {
  route: { name: "landing" },
  meet: null,
  teams: [], runners: [], runnersByBib: {},
  races: [], taps: [], results: [],
  selectedDivision: null,
  channel: null, connected: false, tickTimer: null, loading: false,
};

/* ============================ ROUTING ============================ */
function parseHash() {
  const h = location.hash.replace(/^#\/?/, "");
  if (!h) return { name: "landing" };
  if (h === "create") return { name: "create" };
  const m = h.match(/^m\/([A-Z0-9]{6})(\/(details|roster|timer|recorder|results))?(\/([0-9A-Z]+))?$/);
  if (m) return { name: "meet", code: m[1], view: m[3] || "hub", division: m[5] || null };
  return { name: "landing" };
}
function go(path) { location.hash = "#/" + path; }
window.addEventListener("hashchange", handleRoute);

async function handleRoute() {
  const next = parseHash();
  const wasMeet = State.route.name === "meet";
  const sameMeet = wasMeet && next.name === "meet" && next.code === State.route.code;
  State.route = next;
  if (next.division) State.selectedDivision = next.division;

  if (next.name !== "meet" && wasMeet) await teardownMeet();
  if (next.name === "meet" && !sameMeet) {
    State.loading = true;
    render();
    await loadMeet(next.code);
    State.loading = false;
  }
  render();
}

async function loadMeet(code) {
  await teardownMeet();
  setConnected(false);

  const { data: meet } = await sb.from("public_meets").select("*").eq("code", code).maybeSingle();
  State.meet = meet || null;
  if (!meet) { render(); return; }

  const [t, r, rc, tp, rs] = await Promise.all([
    sb.from("teams").select("*").eq("meet_code", code).order("team_index"),
    sb.from("runners").select("*").eq("meet_code", code).order("bib"),
    sb.from("races").select("*").eq("meet_code", code).order("division"),
    sb.from("taps").select("*").eq("meet_code", code),
    sb.from("results").select("*").eq("meet_code", code),
  ]);

  State.teams = t.data || [];
  State.runners = r.data || [];
  State.runnersByBib = Object.fromEntries((r.data || []).map(x => [x.bib, {
    bib: x.bib, first: x.first_name, last: x.last_name, grade: x.grade,
    gender: x.gender, team: x.team
  }]));
  State.races = rc.data || [];
  State.taps = tp.data || [];
  State.results = rs.data || [];

  State.channel = sb.channel(`meet:${code}`)
    .on("postgres_changes", { event: "*", schema: "public", table: "meets",   filter: `code=eq.${code}` }, handleMeetChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "teams",   filter: `meet_code=eq.${code}` }, handleTeamChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "runners", filter: `meet_code=eq.${code}` }, handleRunnerChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "races",   filter: `meet_code=eq.${code}` }, handleRaceChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "taps",    filter: `meet_code=eq.${code}` }, handleTapChange)
    .on("postgres_changes", { event: "*", schema: "public", table: "results", filter: `meet_code=eq.${code}` }, handleResultChange)
    .subscribe((status) => setConnected(status === "SUBSCRIBED"));
}

async function teardownMeet() {
  if (State.channel) { await sb.removeChannel(State.channel); State.channel = null; }
  if (State.tickTimer) { clearInterval(State.tickTimer); State.tickTimer = null; }
  setConnected(false);
}

function setConnected(b) {
  State.connected = b;
  const el = document.querySelector(".conn");
  if (el) {
    el.classList.toggle("live", b);
    const txt = el.querySelector(".conn-text");
    if (txt) txt.textContent = b ? "LIVE" : "OFFLINE";
  }
}

/* Change Handlers */
function handleMeetChange(p) { if (p.eventType === "DELETE") State.meet = null; else State.meet = {...State.meet, ...p.new}; render(); }
function handleTeamChange(p) { /* simplified */ render(); }
function handleRunnerChange(p) { /* simplified */ render(); }
function handleRaceChange(p) { /* simplified */ render(); }
function handleTapChange(p) { /* simplified */ render(); }
function handleResultChange(p) { /* simplified */ render(); }

/* Helpers */
function tapsForDiv(div) { return State.taps.filter(t => t.division === div).sort((a,b)=>a.place-b.place); }
function resultsForDiv(div) { return State.results.filter(r => r.division === div).sort((a,b)=>a.place-b.place); }
function runnersForDiv(div) { return State.runners.filter(r => divFromRunner(r) === div); }
function raceFor(div) { return State.races.find(r => r.division === div); }

function computeDivisions() {
  const set = new Map();
  for (const r of State.runners) {
    const d = divFromRunner(r);
    if (d) set.set(d, (set.get(d) || 0) + 1);
  }
  return [...set.entries()].map(([division, count]) => ({
    division, label: divLabel(division), count
  })).sort((a,b) => a.division.localeCompare(b.division));
}

/* Auth Modal */
function ensureAuth(code, onAuthed) {
  if (Auth.isAuthed(code)) { onAuthed(); return; }
  showLoginModal(code, onAuthed);
}

function showLoginModal(code, onAuthed) {
  const root = $("modal-root");
  root.innerHTML = `
    <div class="modal-back" onclick="if(event.target===this)closeModal()">
      <div class="modal panel" style="max-width:480px">
        <div style="font-size:11px;color:var(--accent);letter-spacing:0.25em;margin-bottom:8px;">DIRECTOR ACCESS</div>
        <div class="display" style="font-size:36px;margin-bottom:12px;">UNLOCK</div>
        <div style="margin-bottom:24px;color:var(--ink-dim);">Enter director password</div>
        <input id="auth-pwd" type="password" class="field-input" autofocus style="width:100%;margin-bottom:16px"/>
        <div id="auth-err" class="err" style="display:none"></div>
        <button id="auth-submit" class="btn btn-primary" style="width:100%">Unlock Device</button>
      </div>
    </div>`;
  $("auth-submit").onclick = async () => {
    const pwd = $("auth-pwd").value;
    const { data: token } = await sb.rpc("login_meet", { p_code: code, p_password: pwd });
    if (token) {
      Auth.set(code, token);
      closeModal();
      onAuthed();
    } else {
      $("auth-err").textContent = "Invalid password";
      $("auth-err").style.display = "block";
    }
  };
}
function closeModal() { $("modal-root").innerHTML = ""; }

/* ============================ RENDER ============================ */
function render() {
  const r = State.route;
  if (r.name === "landing") return renderLanding();
  if (r.name === "create")  return renderCreate();
  if (r.name === "meet") {
    if (State.loading) return $("app").innerHTML = `<div class="hdr"><div class="logo">XC<span style="color:var(--accent)">CHRONO</span></div></div><div style="text-align:center;padding:120px 20px"><div class="display" style="font-size:48px">LOADING MEET...</div></div>`;
    if (!State.meet) return renderNotFound(r.code);
    if (r.view === "hub")      return renderHub();
    if (r.view === "details")  return renderDetails();
    if (r.view === "roster")   return renderRoster();
    if (r.view === "timer")    return renderTimer();
    if (r.view === "recorder") return renderRecorder();
    if (r.view === "results")  return renderResults();
  }
}

/* Header */
function header(subtitle = "", rightHTML = "") {
  const code = State.meet?.code;
  const isAuthed = code && Auth.isAuthed(code);
  return `
    <div class="hdr">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="logo">XC<span style="color:var(--accent)">CHRONO</span></div>
        ${subtitle ? `<div class="sub">${esc(subtitle)}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        ${code ? `<div class="conn"><div class="conn-dot"></div><span class="conn-text">${State.connected ? "LIVE" : "OFFLINE"}</span></div>` : ''}
        ${code ? `<span class="lock-badge ${isAuthed ? "unlocked" : "locked"}">${isAuthed ? "🔓 UNLOCKED" : "🔒 READ-ONLY"}</span>` : ''}
        ${rightHTML}
      </div>
    </div>`;
}

/* All other render functions (Landing, Create, Hub, etc.) are the same as your original file */
function renderLanding() {
  $("app").innerHTML = `
    ${header("OFFICIAL TIMING")}
    <div class="wrap-wide">
      <div class="display land-hero">THE CLOCK<br><span style="color:var(--accent)">DOESN'T LIE.</span></div>
      <div style="font-size:16px;color:var(--ink-dim);max-width:520px;margin-bottom:48px">
        Premium cross country timing. Real-time. Division scoring. Built for the chute.
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div class="panel" style="padding:32px">
          <div style="font-size:11px;color:var(--accent);margin-bottom:12px">NEW MEET</div>
          <div class="display" style="font-size:42px;margin-bottom:16px">CREATE MEET</div>
          <button class="btn btn-primary" onclick="go('create')">Get Started →</button>
        </div>
        <div class="panel" style="padding:32px">
          <div style="font-size:11px;color:var(--accent2);margin-bottom:12px">JOIN EXISTING</div>
          <div class="display" style="font-size:42px;margin-bottom:16px">ENTER CODE</div>
          <input id="join-code" maxlength="6" placeholder="ABC123" style="width:100%;padding:16px;font-size:28px;text-align:center;border-radius:12px;border:1px solid var(--line);background:var(--panel2);margin-bottom:16px">
          <button class="btn btn-lime" onclick="doJoin()">Join Meet →</button>
        </div>
      </div>
    </div>`;
  $("join-code")?.addEventListener("keydown", e => e.key === "Enter" && doJoin());
}

function doJoin() {
  const v = ($("join-code").value || "").toUpperCase().trim();
  if (v.length === 6) go(`m/${v}`);
}

/* ... [The rest of your original render functions (renderCreate, renderHub, renderTimer, etc.) remain exactly as in your original file] ... */

(async function boot() { await handleRoute(); })();
</script>
</body>
</html>
